apiVersion: v1
kind: Secret
metadata:
  name: wildon-runtime-secrets
  namespace: wildon
type: Opaque
stringData:
  DATABASE_URL: "postgresql://yugabyte@yb-tservers.database.svc.cluster.local:5433/wildon"
  NATS_URL: "nats://nats.wildon.svc.cluster.local:4222"
  SENDGRID_API_KEY: "REPLACE_WITH_SENDGRID_API_KEY"
  SENDGRID_EMAIL_FROM: "noreply@wildon.com.au"

# Notes:
# - Apply a real secret instead of committing real credentials.
# - DATABASE_URL is required by auth-service and control-service at startup.
# - NATS_URL is required if API client invalidation events are enabled.
# - SENDGRID_* keys are used by auth-service email flows.
