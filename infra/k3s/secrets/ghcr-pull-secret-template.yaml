# GHCR image pull secret — apply this once per cluster, not committed with real values.
#
# Prerequisites:
#   1. Create a GitHub PAT at https://github.com/settings/tokens
#      - Classic token, scope: read:packages
#      - Or fine-grained token: Contents=read, Packages=read on zubairlabs/wildon-api-v2
#
#   2. Apply via script (recommended):
#
#        kubectl create secret docker-registry ghcr-pull-secret \
#          --namespace wildon \
#          --docker-server=ghcr.io \
#          --docker-username=<your-github-username> \
#          --docker-password=<your-pat> \
#          --docker-email=<your-email>
#
#   3. Or apply this file after base64-encoding your dockerconfigjson:
#
#        AUTH=$(echo -n "<username>:<pat>" | base64)
#        CONFIG=$(echo -n '{"auths":{"ghcr.io":{"auth":"'$AUTH'"}}}' | base64)
#        # then substitute $CONFIG below and kubectl apply -f this file
#
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: wildon
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: REPLACE_WITH_BASE64_DOCKERCONFIGJSON
