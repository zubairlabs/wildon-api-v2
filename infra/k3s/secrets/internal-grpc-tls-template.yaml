apiVersion: v1
kind: Secret
metadata:
  name: REPLACE_WITH_SERVICE_NAME-grpc-tls
  namespace: wildon
type: Opaque
stringData:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_CA_CERT
    -----END CERTIFICATE-----
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_SERVICE_CERT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_SERVICE_PRIVATE_KEY
    -----END PRIVATE KEY-----

# Notes:
# 1) Create one secret per service:
#    - auth-service-grpc-tls
#    - public-service-grpc-tls
#    - core-service-grpc-tls
#    - users-service-grpc-tls
#    - api-clients-service-grpc-tls
#    - billing-service-grpc-tls
#    - logs-service-grpc-tls
#    - storage-service-grpc-tls
#    - export-service-grpc-tls
#    - gateway-service-grpc-tls
#    - platform-service-grpc-tls
#    - control-service-grpc-tls
# 2) Service cert SAN URI must match:
#    spiffe://wildon.internal/service/<service-name>
