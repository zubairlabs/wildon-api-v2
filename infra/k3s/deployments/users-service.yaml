apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: wildon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: users-service
          image: ghcr.io/zubairlabs/wildon-api-v2/users-service:latest
          imagePullPolicy: Always
          env:
            - name: USERS_GRPC_BIND_ADDR
              value: "0.0.0.0:50057"
            - name: INTERNAL_CALLER_SERVICE
              value: "users-service"
            - name: INTERNAL_TLS_ENABLE_CLIENT
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_SERVER_TLS
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_CLIENT_AUTH
              value: "true"
            - name: INTERNAL_AUTH_REQUIRE_MTLS
              value: "true"
            - name: INTERNAL_AUTH_SPIFFE_PREFIX
              value: "spiffe://wildon.internal/service/"
            - name: INTERNAL_TLS_CA_CERT_PATH
              value: "/var/run/wildon/pki/ca.crt"
            - name: INTERNAL_TLS_SERVER_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_SERVER_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
            - name: INTERNAL_TLS_CLIENT_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_CLIENT_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wildon-runtime-secrets
                  key: DATABASE_URL
            - name: STORAGE_GRPC_ENDPOINT
              value: https://storage-service:50055
          volumeMounts:
            - name: internal-grpc-tls
              mountPath: /var/run/wildon/pki
              readOnly: true
          ports:
            - containerPort: 50057
      volumes:
        - name: internal-grpc-tls
          secret:
            secretName: users-service-grpc-tls
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
  namespace: wildon
spec:
  selector:
    app: users-service
  ports:
    - name: grpc
      port: 50057
      targetPort: 50057
