apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: wildon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: gateway-service
          image: ghcr.io/zubairlabs/wildon-api-v2/gateway-service:latest
          imagePullPolicy: Always
          env:
            - name: GATEWAY_BIND_ADDR
              value: "0.0.0.0:8080"
            - name: JWT_EXPECTED_ISSUER
              value: "https://auth.wildon.com.au"
            - name: GATEWAY_REQUIRE_API_CLIENT_INVALIDATION
              value: "false"
            - name: AUTH_GRPC_ENDPOINT
              value: "https://auth-service:50051"
            - name: API_CLIENTS_GRPC_ENDPOINT
              value: "https://api-clients-service:50058"
            - name: PUBLIC_GRPC_ENDPOINT
              value: "https://public-service:50052"
            - name: CORE_GRPC_ENDPOINT
              value: "https://core-service:50053"
            - name: INTERNAL_CALLER_SERVICE
              value: "gateway-service"
            - name: INTERNAL_TLS_ENABLE_CLIENT
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_SERVER_TLS
              value: "true"
            - name: INTERNAL_AUTH_REQUIRE_MTLS
              value: "true"
            - name: INTERNAL_AUTH_SPIFFE_PREFIX
              value: "spiffe://wildon.internal/service/"
            - name: REGION_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-credentials
                  key: live-public-key
                  optional: true
            - name: REGION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-credentials
                  key: live-secret-key
                  optional: true
            - name: INTERNAL_TLS_CA_CERT_PATH
              value: "/var/run/wildon/pki/ca.crt"
            - name: INTERNAL_TLS_CLIENT_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_CLIENT_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
          volumeMounts:
            - name: internal-grpc-tls
              mountPath: /var/run/wildon/pki
              readOnly: true
          ports:
            - containerPort: 8080
      volumes:
        - name: internal-grpc-tls
          secret:
            secretName: gateway-service-grpc-tls
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: wildon
spec:
  selector:
    app: gateway-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
