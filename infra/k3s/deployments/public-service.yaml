apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-service
  namespace: wildon
spec:
  replicas: 3
  selector:
    matchLabels:
      app: public-service
  template:
    metadata:
      labels:
        app: public-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: public-service
          image: ghcr.io/zubairlabs/wildon-api-v2/public-service:latest
          imagePullPolicy: Always
          env:
            - name: PUBLIC_GRPC_BIND_ADDR
              value: "0.0.0.0:50052"
            - name: BILLING_GRPC_ENDPOINT
              value: https://billing-service:50059
            - name: LOGS_GRPC_ENDPOINT
              value: https://logs-service:50054
            - name: STORAGE_GRPC_ENDPOINT
              value: https://storage-service:50055
            - name: EXPORT_GRPC_ENDPOINT
              value: https://export-service:50056
            - name: USERS_GRPC_ENDPOINT
              value: https://users-service:50057
            - name: INTERNAL_CALLER_SERVICE
              value: "public-service"
            - name: INTERNAL_TLS_ENABLE_CLIENT
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_SERVER_TLS
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_CLIENT_AUTH
              value: "true"
            - name: INTERNAL_AUTH_REQUIRE_MTLS
              value: "true"
            - name: INTERNAL_AUTH_SPIFFE_PREFIX
              value: "spiffe://wildon.internal/service/"
            - name: INTERNAL_TLS_CA_CERT_PATH
              value: "/var/run/wildon/pki/ca.crt"
            - name: INTERNAL_TLS_SERVER_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_SERVER_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
            - name: INTERNAL_TLS_CLIENT_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_CLIENT_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
          volumeMounts:
            - name: internal-grpc-tls
              mountPath: /var/run/wildon/pki
              readOnly: true
          ports:
            - containerPort: 50052
      volumes:
        - name: internal-grpc-tls
          secret:
            secretName: public-service-grpc-tls
---
apiVersion: v1
kind: Service
metadata:
  name: public-service
  namespace: wildon
spec:
  selector:
    app: public-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
