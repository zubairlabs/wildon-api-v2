apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: wildon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: auth-service
          image: ghcr.io/zubairlabs/wildon-api-v2/auth-service:latest
          imagePullPolicy: Always
          env:
            - name: AUTH_HTTP_BIND_ADDR
              value: "0.0.0.0:8081"
            - name: AUTH_GRPC_BIND_ADDR
              value: "0.0.0.0:50051"
            - name: JWT_ISSUER
              value: "https://auth.wildon.com.au"
            - name: JWT_EXPECTED_ISSUER
              value: "https://auth.wildon.com.au"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wildon-runtime-secrets
                  key: DATABASE_URL
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wildon-runtime-secrets
                  key: SENDGRID_API_KEY
            - name: SENDGRID_EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: wildon-runtime-secrets
                  key: SENDGRID_EMAIL_FROM
            - name: USERS_GRPC_ENDPOINT
              value: https://users-service:50057
            - name: INTERNAL_CALLER_SERVICE
              value: "auth-service"
            - name: INTERNAL_TLS_ENABLE_CLIENT
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_SERVER_TLS
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_CLIENT_AUTH
              value: "true"
            - name: INTERNAL_AUTH_REQUIRE_MTLS
              value: "true"
            - name: INTERNAL_AUTH_SPIFFE_PREFIX
              value: "spiffe://wildon.internal/service/"
            - name: INTERNAL_TLS_CA_CERT_PATH
              value: "/var/run/wildon/pki/ca.crt"
            - name: INTERNAL_TLS_SERVER_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_SERVER_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
            - name: INTERNAL_TLS_CLIENT_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_CLIENT_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
          volumeMounts:
            - name: internal-grpc-tls
              mountPath: /var/run/wildon/pki
              readOnly: true
          ports:
            - containerPort: 8081
            - containerPort: 50051
      volumes:
        - name: internal-grpc-tls
          secret:
            secretName: auth-service-grpc-tls
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: wildon
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: grpc
      port: 50051
      targetPort: 50051
