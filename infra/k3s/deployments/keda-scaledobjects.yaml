apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: export-service-worker
  namespace: wildon
spec:
  scaleTargetRef:
    name: export-service
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 30
  fallback:
    failureThreshold: 3
    replicas: 2
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: export_jobs_pending
        query: sum(wildon_export_jobs_pending)
        threshold: "50"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: logs-service-ingestion
  namespace: wildon
spec:
  scaleTargetRef:
    name: logs-service
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 20
  fallback:
    failureThreshold: 3
    replicas: 2
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: logs_ingestion_backlog
        query: sum(wildon_logs_ingestion_backlog)
        threshold: "100"
