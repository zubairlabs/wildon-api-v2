apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: wildon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: chat-service
          image: ghcr.io/zubairlabs/wildon-api-v2/chat-service:latest
          imagePullPolicy: Always
          env:
            - name: CHAT_BIND_ADDR
              value: "0.0.0.0:8082"
            - name: CHAT_QUEUE_TIMEOUT_MINS
              value: "10"
            - name: NATS_URL
              value: "nats://nats.messaging.svc.cluster.local:4222"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wildon-runtime-secrets
                  key: DATABASE_URL
          ports:
            - containerPort: 8082
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: wildon
spec:
  selector:
    app: chat-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
