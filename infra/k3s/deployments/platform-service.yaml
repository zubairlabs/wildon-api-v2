apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-service
  namespace: wildon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-service
  template:
    metadata:
      labels:
        app: platform-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: platform-service
          image: ghcr.io/zubairlabs/wildon-api-v2/platform-service:latest
          imagePullPolicy: Always
          env:
            - name: PLATFORM_HTTP_BIND_ADDR
              value: "0.0.0.0:8083"
            - name: CORE_GRPC_ENDPOINT
              value: "https://core-service:50053"
            - name: INTERNAL_CALLER_SERVICE
              value: "platform-service"
            - name: INTERNAL_TLS_ENABLE_CLIENT
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_SERVER_TLS
              value: "true"
            - name: INTERNAL_TLS_REQUIRE_CLIENT_AUTH
              value: "true"
            - name: INTERNAL_AUTH_REQUIRE_MTLS
              value: "true"
            - name: INTERNAL_AUTH_SPIFFE_PREFIX
              value: "spiffe://wildon.internal/service/"
            - name: INTERNAL_TLS_CA_CERT_PATH
              value: "/var/run/wildon/pki/ca.crt"
            - name: INTERNAL_TLS_SERVER_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_SERVER_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
            - name: INTERNAL_TLS_CLIENT_CERT_PATH
              value: "/var/run/wildon/pki/tls.crt"
            - name: INTERNAL_TLS_CLIENT_KEY_PATH
              value: "/var/run/wildon/pki/tls.key"
          volumeMounts:
            - name: internal-grpc-tls
              mountPath: /var/run/wildon/pki
              readOnly: true
      volumes:
        - name: internal-grpc-tls
          secret:
            secretName: platform-service-grpc-tls
---
apiVersion: v1
kind: Service
metadata:
  name: platform-service
  namespace: wildon
spec:
  selector:
    app: platform-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
