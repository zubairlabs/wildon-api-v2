apiVersion: v1
kind: ServiceAccount
metadata:
  name: wildon-deployer
  namespace: wildon
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wildon-deployer-role
  namespace: wildon
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wildon-deployer-binding
  namespace: wildon
subjects:
  - kind: ServiceAccount
    name: wildon-deployer
    namespace: wildon
  - kind: ServiceAccount
    name: k3s-deployer
    namespace: wildon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wildon-deployer-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wildon-observer
  namespace: wildon
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wildon-observer-role
  namespace: wildon
rules:
  - apiGroups: ["", "apps", "batch", "autoscaling", "policy", "keda.sh"]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - deployments
      - replicasets
      - jobs
      - horizontalpodautoscalers
      - poddisruptionbudgets
      - scaledobjects
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wildon-observer-binding
  namespace: wildon
subjects:
  - kind: ServiceAccount
    name: wildon-observer
    namespace: wildon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wildon-observer-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wildon-observer-metrics
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wildon-observer-metrics-binding
subjects:
  - kind: ServiceAccount
    name: wildon-observer
    namespace: wildon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wildon-observer-metrics
