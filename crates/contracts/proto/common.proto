syntax = "proto3";

package wildon.common.v1;

enum Audience {
  AUDIENCE_UNSPECIFIED = 0;
  AUDIENCE_PUBLIC = 1;
  AUDIENCE_PLATFORM = 2;
  AUDIENCE_CONTROL = 3;
}

enum Realm {
  REALM_UNSPECIFIED = 0;
  REALM_WILDON_PUBLIC = 1;
  REALM_WILDON_PLATFORM = 2;
  REALM_WILDON_CONTROL = 3;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_UNAUTHORIZED = 1;
  ERROR_CODE_FORBIDDEN = 2;
  ERROR_CODE_NOT_FOUND = 3;
  ERROR_CODE_CONFLICT = 4;
  ERROR_CODE_INVALID_ARGUMENT = 5;
  ERROR_CODE_RATE_LIMITED = 6;
  ERROR_CODE_UNAVAILABLE = 7;
  ERROR_CODE_INTERNAL = 8;
}

message ErrorDetails {
  ErrorCode code = 1;
  string request_id = 2;
  string trace_id = 3;
  string user_id = 4;
  string client_id = 5;
  map<string, string> meta = 6;
}
