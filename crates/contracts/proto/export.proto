syntax = "proto3";

package wildon.export.v1;

service ExportService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc CreateExportJob(CreateExportJobRequest) returns (CreateExportJobResponse);
  rpc GetExportJob(GetExportJobRequest) returns (GetExportJobResponse);
  rpc DownloadExport(DownloadExportRequest) returns (DownloadExportResponse);
  rpc RetryExportJob(RetryExportJobRequest) returns (RetryExportJobResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string request_id = 2;
}

enum ExportJobStatus {
  EXPORT_JOB_STATUS_UNSPECIFIED = 0;
  EXPORT_JOB_STATUS_QUEUED = 1;
  EXPORT_JOB_STATUS_RUNNING = 2;
  EXPORT_JOB_STATUS_COMPLETED = 3;
  EXPORT_JOB_STATUS_FAILED = 4;
}

message ExportJob {
  string job_id = 1;
  string user_id = 2;
  string export_kind = 3;
  string format = 4;
  ExportJobStatus status = 5;
  string artifact_key = 6;
  string idempotency_key = 7;
  string error_message = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
  int64 completed_at = 11;
}

message CreateExportJobRequest {
  string user_id = 1;
  string export_kind = 2;
  string format = 3;
  string idempotency_key = 4;
}

message CreateExportJobResponse {
  ExportJob job = 1;
  bool duplicate = 2;
}

message GetExportJobRequest {
  string job_id = 1;
}

message GetExportJobResponse {
  ExportJob job = 1;
}

message DownloadExportRequest {
  string job_id = 1;
  int64 expires_in_seconds = 2;
}

message DownloadExportResponse {
  string job_id = 1;
  string artifact_key = 2;
  string download_url = 3;
  int64 expires_at = 4;
}

message RetryExportJobRequest {
  string job_id = 1;
}

message RetryExportJobResponse {
  ExportJob job = 1;
}
